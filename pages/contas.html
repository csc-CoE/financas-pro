<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contas – FinançasPRO</title>
  <base href="/financas-pro/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">FinançasPRO</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item"><span class="nav-icon">▦</span> Dashboard</a>
      <a href="pages/transacoes.html" class="nav-item"><span class="nav-icon">⇅</span> Transações</a>
      <a href="pages/comprovantes.html" class="nav-item"><span class="nav-icon">◧</span> Comprovantes</a>
      <a href="pages/contas.html" class="nav-item active"><span class="nav-icon">▣</span> Contas</a>
      <a href="pages/chatbot.html" class="nav-item"><span class="nav-icon">◎</span> Consultor IA</a>
    </nav>
    <div class="sidebar-footer">
      <div class="month-selector">
        <button id="prevMonth" class="month-btn">‹</button>
        <span id="currentMonthLabel">Mai 2026</span>
        <button id="nextMonth" class="month-btn">›</button>
      </div>
    </div>
  </aside>

  <header class="mobile-header">
    <button class="hamburger" id="hamburger">☰</button>
    <span class="logo-text">FinançasPRO</span>
    <span></span>
  </header>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Contas</h1>
        <p class="page-subtitle">Gerencie seus bancos e carteiras</p>
      </div>
      <button class="btn-primary" id="btnNovaConta">+ Nova Conta</button>
    </div>

    <div id="accountsGrid" class="accounts-grid"></div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="contaModal">
    <div class="modal">
      <h2 class="modal-title" id="contaModalTitle">Nova Conta</h2>

      <div class="form-group">
        <label class="form-label">Nome da Conta</label>
        <input type="text" class="form-input" id="contaNome" placeholder="Ex: Nubank, Caixa, Carteira...">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Banco / Instituição</label>
          <input type="text" class="form-input" id="contaBanco" placeholder="Ex: Nubank">
        </div>
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <select class="form-select" id="contaTipo">
            <option value="corrente">Conta Corrente</option>
            <option value="poupanca">Poupança</option>
            <option value="carteira">Carteira</option>
            <option value="investimento">Investimento</option>
            <option value="credito">Cartão de Crédito</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Saldo Inicial (R$)</label>
        <input type="number" class="form-input" id="contaSaldo" placeholder="0,00" step="0.01">
      </div>

      <div class="form-group">
        <label class="form-label">Cor</label>
        <div id="colorPicker" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px"></div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" id="btnCancelarConta">Cancelar</button>
        <button class="btn-primary" id="btnSalvarConta">Salvar</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script>
    const COLORS = ['#f5c842','#00e5a0','#ff4f6e','#7c8cff','#ff9b43','#e056e0','#38e0d4','#ff6b6b','#a0e854'];
    let editContaId = null;
    let selectedColor = COLORS[0];

    function buildColorPicker() {
      document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
        `<div class="color-dot" data-color="${c}" style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${c === selectedColor ? '#fff' : 'transparent'};transition:border-color 0.15s" onclick="selectColor('${c}')"></div>`
      ).join('');
    }

    function selectColor(color) {
      selectedColor = color;
      buildColorPicker();
    }

    function renderAccounts() {
      const contas = DB.getContas();
      const grid = document.getElementById('accountsGrid');

      if (contas.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;padding:60px">Nenhuma conta. <button onclick="openContaModal()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px">Adicionar</button></div>`;
        return;
      }

      const txs = DB.getTransacoes();

      grid.innerHTML = contas.map(conta => {
        const contaTxs = txs.filter(t => t.conta === conta.id);
        const entradas = contaTxs.filter(t => t.tipo === 'entrada').reduce((s, t) => s + Number(t.valor), 0);
        const saidas = contaTxs.filter(t => t.tipo === 'saida').reduce((s, t) => s + Number(t.valor), 0);
        const saldoCalculado = Number(conta.saldoInicial || 0) + entradas - saidas;
        const tipoLabel = { corrente:'Conta Corrente', poupanca:'Poupança', carteira:'Carteira', investimento:'Investimento', credito:'Cartão de Crédito' };

        return `
          <div class="account-card" style="border-top:3px solid ${conta.cor || '#f5c842'}">
            <div class="account-name">${conta.nome}</div>
            <div class="account-bank">${conta.banco || ''} · ${tipoLabel[conta.tipo] || conta.tipo}</div>
            <div class="account-saldo-label">Saldo</div>
            <div class="account-saldo" style="color:${saldoCalculado >= 0 ? 'var(--entrada)' : 'var(--saida)'}">
              ${formatCurrency(saldoCalculado)}
            </div>
            <div style="display:flex;gap:8px;margin-top:12px;font-size:12px;color:var(--text2)">
              <span style="color:var(--entrada)">↓ ${formatCurrency(entradas)}</span>
              <span style="color:var(--text3)">·</span>
              <span style="color:var(--saida)">↑ ${formatCurrency(saidas)}</span>
            </div>
            <div class="account-actions">
              <button class="btn-secondary" style="font-size:12px;padding:6px 14px" onclick='editConta(${JSON.stringify(conta).split("'").join("&#39;")})'>✎ Editar</button>
              <button class="btn-danger" style="font-size:12px;padding:6px 14px" onclick="deleteConta('${conta.id}')">Excluir</button>
            </div>
          </div>`;
      }).join('');
    }

    function openContaModal(conta = null) {
      editContaId = conta ? conta.id : null;
      selectedColor = conta ? (conta.cor || COLORS[0]) : COLORS[0];
      document.getElementById('contaModalTitle').textContent = conta ? 'Editar Conta' : 'Nova Conta';
      document.getElementById('contaNome').value = conta ? conta.nome : '';
      document.getElementById('contaBanco').value = conta ? (conta.banco || '') : '';
      document.getElementById('contaTipo').value = conta ? conta.tipo : 'corrente';
      document.getElementById('contaSaldo').value = conta ? (conta.saldoInicial || '') : '';
      buildColorPicker();
      document.getElementById('contaModal').classList.add('open');
    }

    function editConta(conta) { openContaModal(conta); }

    function deleteConta(id) {
      if (!confirm('Excluir esta conta?')) return;
      DB.deleteConta(id);
      renderAccounts();
      toast('Conta excluída.', 'info');
    }

    document.getElementById('btnNovaConta').addEventListener('click', () => openContaModal());
    document.getElementById('btnCancelarConta').addEventListener('click', () => document.getElementById('contaModal').classList.remove('open'));
    document.getElementById('contaModal').addEventListener('click', e => { if (e.target === e.currentTarget) e.target.classList.remove('open'); });

    document.getElementById('btnSalvarConta').addEventListener('click', () => {
      const nome = document.getElementById('contaNome').value.trim();
      if (!nome) return toast('Informe o nome da conta.', 'error');

      const data = {
        nome,
        banco: document.getElementById('contaBanco').value.trim(),
        tipo: document.getElementById('contaTipo').value,
        saldoInicial: parseFloat(document.getElementById('contaSaldo').value) || 0,
        cor: selectedColor,
      };

      if (editContaId) {
        DB.updateConta(editContaId, data);
        toast('Conta atualizada!', 'success');
      } else {
        DB.addConta(data);
        toast('Conta criada!', 'success');
      }

      document.getElementById('contaModal').classList.remove('open');
      renderAccounts();
    });

    document.addEventListener('DOMContentLoaded', renderAccounts);
  </script>
</body>
</html>
